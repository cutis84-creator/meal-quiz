<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>급식판을 채워라!</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: #fff; min-height: 100vh; padding: 24px 16px; color: #222; }
#confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }

h1 { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 20px; color: #222; letter-spacing: -0.5px; }

/* 입력 섹션 */
.setup-card { max-width: 560px; margin: 0 auto 20px; background: #f8f8f8; border-radius: 16px; padding: 20px; border: 1px solid #eee; }
.input-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.input-row label { font-size: 14px; color: #555; white-space: nowrap; min-width: 64px; }
.input-row input { flex: 1; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 15px; outline: none; background: #fff; transition: border 0.2s; }
.input-row input:focus { border-color: #4f46e5; }
.fetch-btn { width: 100%; padding: 13px; background: #4f46e5; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; letter-spacing: -0.3px; }
.fetch-btn:hover { background: #4338ca; }
.fetch-btn:disabled { background: #bbb; cursor: default; }

/* 게임 레이아웃 - 가로 */
.game-layout { max-width: 960px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }

/* 카드 공통 */
.card { background: #fff; border-radius: 16px; padding: 20px; border: 1.5px solid #ebebeb; }
.card-title { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }

/* 왼쪽 - 급식판 */
.school-tag { font-size: 13px; color: #4f46e5; font-weight: 700; margin-bottom: 10px; }
.progress-wrap { background: #f0f0f0; border-radius: 99px; height: 6px; margin-bottom: 14px; overflow: hidden; }
.progress-bar { height: 100%; background: #4f46e5; border-radius: 99px; transition: width 0.5s ease; }
.menu-item { display: flex; align-items: center; gap: 10px; padding: 9px 8px; border-bottom: 1px solid #f3f3f3; cursor: pointer; border-radius: 8px; transition: background 0.15s; }
.menu-item:last-child { border-bottom: none; }
.menu-item:hover { background: #f5f4ff; }
.menu-item.active { background: #eef0ff; border: 1px solid #c7d0ff; }
.menu-item.done { background: #f0fdf4; }
.menu-num { font-size: 12px; color: #bbb; min-width: 20px; text-align: center; font-weight: 600; }
.menu-chosung { font-size: 16px; font-weight: 700; letter-spacing: 3px; color: #333; }
.menu-revealed { font-size: 14px; color: #333; font-weight: 600; animation: revealPop 0.35s cubic-bezier(0.175,0.885,0.32,1.275); }
@keyframes revealPop { 0%{transform:scale(0.6);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }

/* 오른쪽 - 퀴즈 */
.chosung-display { font-size: 34px; font-weight: 700; letter-spacing: 10px; color: #222; text-align: center; padding: 20px 10px; background: #f8f8f8; border-radius: 12px; margin-bottom: 14px; border: 2px dashed #ddd; transition: all 0.25s; min-height: 88px; display: flex; align-items: center; justify-content: center; }
.chosung-display.shake { animation: shake 0.35s ease; background: #fff5f5; border-color: #fca5a5; }
.chosung-display.pop { animation: popCorrect 0.4s ease; background: #f0fdf4; border-color: #86efac; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
@keyframes popCorrect { 0%{transform:scale(1)} 35%{transform:scale(1.06)} 100%{transform:scale(1)} }

.feedback { text-align: center; font-size: 15px; font-weight: 600; padding: 10px; border-radius: 8px; margin-bottom: 12px; min-height: 42px; display: flex; align-items: center; justify-content: center; }
.feedback.correct { background: #dcfce7; color: #15803d; }
.feedback.wrong { background: #fee2e2; color: #b91c1c; }
.feedback.idle { background: #f5f5f5; color: #aaa; font-weight: 400; }

.answer-row { display: flex; gap: 8px; margin-bottom: 10px; }
.answer-row input { flex: 1; padding: 11px 12px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 15px; outline: none; transition: border 0.2s; }
.answer-row input:focus { border-color: #4f46e5; }
.answer-row button { padding: 11px 16px; background: #4f46e5; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
.answer-row button:hover { background: #4338ca; }

.btn-row { display: flex; gap: 8px; }
.btn-row button { flex: 1; padding: 10px; background: #fff; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 13px; cursor: pointer; color: #555; font-weight: 500; transition: all 0.15s; }
.btn-row button:hover { background: #f5f4ff; border-color: #c7d0ff; color: #4f46e5; }

/* 완료 배너 */
.all-clear { text-align: center; padding: 24px 16px; max-width: 960px; margin: 20px auto 0; background: #fafafa; border-radius: 16px; border: 1.5px solid #ebebeb; }
.all-clear .big-text { font-size: 28px; font-weight: 700; color: #4f46e5; animation: bounce 0.6s infinite alternate; display: inline-block; }
.all-clear p { font-size: 15px; color: #555; margin-top: 8px; }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-8px)} }

.msg { text-align: center; color: #bbb; padding: 30px 10px; font-size: 14px; line-height: 1.9; max-width: 560px; margin: 0 auto; }

/* 반응형 - 태블릿/모바일 */
@media (max-width: 640px) {
  body { padding: 16px 12px; }
  h1 { font-size: 18px; margin-bottom: 14px; }
  .game-layout { grid-template-columns: 1fr; gap: 14px; }
  .chosung-display { font-size: 26px; letter-spacing: 7px; padding: 16px 8px; }
  .setup-card { padding: 16px; }
}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<h1>급식판을 채워라</h1>

<div class="setup-card">
  <div class="input-row">
    <label>학교 이름</label>
    <input type="text" id="schoolInput" placeholder="예: 대구초등학교" />
  </div>
  <div class="input-row">
    <label>날짜</label>
    <input type="date" id="dateInput" />
  </div>
  <button class="fetch-btn" id="fetchBtn" onclick="fetchMeal()">급식 불러오기</button>
</div>

<div id="gameArea"></div>

<script>
const PROXY = "https://neis-proxy.cutis84.workers.dev";
const CHOSUNG = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];

function getChosung(str) {
  return str.split('').map(ch => {
    const code = ch.charCodeAt(0) - 0xAC00;
    if (code < 0 || code > 11171) return /[a-zA-Z0-9]/.test(ch) ? ch : '';
    return CHOSUNG[Math.floor(code / 28 / 21)];
  }).join('');
}

function cleanMenu(raw) {
  return raw.replace(/\([^)]*\)/g,'').replace(/\[[^\]]*\]/g,'').replace(/[0-9.]+/g,'').replace(/\s+/g,' ').trim();
}

let menus = [], currentIdx = 0, revealed = [];

(function setToday() {
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('dateInput').value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
})();

/* 팡파레 */
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let confettis = [];
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);
function launchConfetti(big) {
  const count = big ? 140 : 55;
  const colors = ['#4f46e5','#7c3aed','#06b6d4','#10b981','#f59e0b','#ef4444','#ec4899'];
  for (let i = 0; i < count; i++) {
    confettis.push({ x: Math.random()*canvas.width, y: -10, w: Math.random()*10+4, h: Math.random()*6+3, color: colors[Math.floor(Math.random()*colors.length)], vx: (Math.random()-0.5)*5, vy: Math.random()*4+2, rot: Math.random()*360, rotV: (Math.random()-0.5)*8, life: 1 });
  }
}
(function loop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  confettis = confettis.filter(c => c.life > 0);
  confettis.forEach(c => {
    c.x+=c.vx; c.y+=c.vy; c.rot+=c.rotV; c.life-=0.013;
    ctx.save(); ctx.globalAlpha=c.life; ctx.translate(c.x,c.y); ctx.rotate(c.rot*Math.PI/180);
    ctx.fillStyle=c.color; ctx.fillRect(-c.w/2,-c.h/2,c.w,c.h); ctx.restore();
  });
  requestAnimationFrame(loop);
})();

/* API */
async function fetchMeal() {
  const name = document.getElementById('schoolInput').value.trim();
  const date = document.getElementById('dateInput').value;
  const btn = document.getElementById('fetchBtn');
  const area = document.getElementById('gameArea');
  if (!name || !date) { area.innerHTML = '<p class="msg">학교 이름과 날짜를 입력해주세요.</p>'; return; }
  btn.textContent = '불러오는 중...'; btn.disabled = true;
  area.innerHTML = '<p class="msg">급식 정보를 가져오고 있어요...</p>';
  try {
    const sr = await fetch(`${PROXY}/school?name=${encodeURIComponent(name)}`);
    const sd = await sr.json();
    if (!sd.schoolInfo) { area.innerHTML = '<p class="msg">학교를 찾을 수 없어요.<br>정확한 이름으로 다시 검색해보세요.</p>'; return; }
    const school = sd.schoolInfo[1].row[0];
    const d = date.replace(/-/g,'');
    const mr = await fetch(`${PROXY}/meal?orgCode=${school.SD_SCHUL_CODE}&sdCode=${school.ATPT_OFCDC_SC_CODE}&date=${d}`);
    const md = await mr.json();
    if (!md.mealServiceDietInfo) { area.innerHTML = '<p class="msg">해당 날짜의 급식 정보가 없어요.<br>(주말, 공휴일, 방학에는 급식이 없을 수 있어요)</p>'; return; }
    menus = md.mealServiceDietInfo[1].row[0].DDISH_NM.split('<br/>').map(cleanMenu).filter(m => m.length > 1);
    currentIdx = 0; revealed = new Array(menus.length).fill(false);
    renderGame(school.SCHUL_NM, date);
    launchConfetti(false);
  } catch(e) {
    area.innerHTML = '<p class="msg">오류가 발생했어요.<br>잠시 후 다시 시도해주세요.</p>';
  } finally {
    btn.textContent = '급식 불러오기'; btn.disabled = false;
  }
}

function renderGame(schoolName, date) {
  document.getElementById('gameArea').innerHTML = `
    <div class="game-layout">
      <div class="card" id="leftCard">
        <div class="card-title">오늘의 급식판</div>
        <div class="school-tag">${schoolName} &middot; ${date}</div>
        <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
        <div id="menuList"></div>
      </div>
      <div class="card" id="rightCard">
        <div class="card-title">초성 힌트</div>
        <div class="chosung-display" id="chosungDisplay"></div>
        <div class="feedback idle" id="feedback">정답을 입력해보세요</div>
        <div class="answer-row">
          <input type="text" id="answerInput" placeholder="메뉴 이름 입력" onkeydown="if(event.key==='Enter')checkAnswer()" />
          <button onclick="checkAnswer()">확인</button>
        </div>
        <div class="btn-row">
          <button onclick="showAnswer()">정답 보기</button>
          <button onclick="nextMenu()">다음 문제</button>
        </div>
      </div>
    </div>`;
  renderList(); renderQuiz(); updateProgress();
}

function updateProgress() {
  const count = revealed.filter(Boolean).length;
  const bar = document.getElementById('progressBar');
  if (bar) bar.style.width = Math.round((count/menus.length)*100) + '%';
  if (count === menus.length) {
    setTimeout(() => {
      launchConfetti(true);
      setTimeout(() => launchConfetti(true), 500);
      setTimeout(() => launchConfetti(true), 1000);
      const ac = document.createElement('div');
      ac.className = 'all-clear';
      ac.innerHTML = '<span class="big-text">급식판 완성!</span><p>오늘 급식을 모두 맞혔어요.</p>';
      document.getElementById('gameArea').appendChild(ac);
    }, 400);
  }
}

function renderList() {
  document.getElementById('menuList').innerHTML = menus.map((m,i) => `
    <div class="menu-item ${i===currentIdx?'active':''} ${revealed[i]?'done':''}" onclick="selectMenu(${i})">
      <span class="menu-num">${i+1}</span>
      <span class="${revealed[i]?'menu-revealed':'menu-chosung'}">${revealed[i]?m:getChosung(m)}</span>
    </div>`).join('');
}

function renderQuiz() {
  const el = document.getElementById('chosungDisplay');
  el.textContent = getChosung(menus[currentIdx]);
  el.className = 'chosung-display';
  const fb = document.getElementById('feedback');
  fb.textContent = '정답을 입력해보세요'; fb.className = 'feedback idle';
  const inp = document.getElementById('answerInput');
  inp.value = ''; inp.focus();
}

function selectMenu(i) { currentIdx = i; renderList(); renderQuiz(); }

function checkAnswer() {
  const ans = document.getElementById('answerInput').value.trim();
  const fb = document.getElementById('feedback');
  const el = document.getElementById('chosungDisplay');
  if (!ans) return;
  if (ans === menus[currentIdx]) {
    fb.textContent = '정답입니다!'; fb.className = 'feedback correct';
    el.className = 'chosung-display pop';
    launchConfetti(false);
    revealed[currentIdx] = true; renderList(); updateProgress();
    const next = revealed.findIndex(r => !r);
    if (next !== -1) setTimeout(() => { currentIdx = next; renderList(); renderQuiz(); }, 1200);
  } else {
    fb.textContent = '아닙니다! 다시 도전해보세요'; fb.className = 'feedback wrong';
    el.className = 'chosung-display shake';
    setTimeout(() => { el.className = 'chosung-display'; }, 380);
  }
}

function showAnswer() {
  const fb = document.getElementById('feedback');
  fb.textContent = '정답: ' + menus[currentIdx]; fb.className = 'feedback idle';
  revealed[currentIdx] = true; renderList(); updateProgress();
}

function nextMenu() {
  currentIdx = (currentIdx + 1) % menus.length; renderList(); renderQuiz();
}
</script>
</body>
</html>
